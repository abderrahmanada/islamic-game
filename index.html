<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>التحدي الشامل - التربية الإسلامية</title>

<style>
body {
  margin:0;
  background:#0d1117;
  color:white;
  font-family:Arial;
}

#ui {
  width:380px;
  margin:40px auto;
  background:#161b22;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h3 { text-align:center; color:#00ffaa; }

#question { margin:15px 0; line-height:1.6; }

.option {
  background:#222;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  cursor:pointer;
}

.option:hover { background:#333; }

#result {
  margin-top:10px;
  font-weight:bold;
}

#score {
  margin-top:10px;
  text-align:center;
  color:#00ffaa;
}
</style>
</head>

<body>

<div id="ui">
<h3>🎮 التحدي الشامل للتربية الإسلامية</h3>

<div id="question"></div>
<div id="options"></div>

<div id="result"></div>
<div id="score">النقاط: 0</div>
</div>

<script>

// ---------------- قاعدة البيانات ----------------
const quiz = [

{q:"ما تعريف الإيمان؟", options:[

"إحساس مؤقت غير ثابت"
], correct:0},

{q:"ما المقصود باليقين؟", options:[

"علم مع احتمال الشك",
"ظن غير مؤكد"
], correct:0},

{q:"ما تعريف الأسرة؟", options:[
"نواة المجتمع القائمة على الزواج",
"مجموعة أفراد بلا رابط",
"تنظيم اقتصادي فقط"
], correct:0},

{q:"ما تعريف الزواج؟", options:[
"ميثاق شرعي دائم",
"اتفاق مؤقت بين طرفين",
"علاقة غير ملزمة"
], correct:0},

{q:"ما تعريف الطلاق؟", options:[
"حل ميثاق الزوجية",
"استمرار العلاقة الزوجية",
"بداية الخطبة"
], correct:0},

{q:"ما معنى الكفاءة؟", options:[
"القدرة والجدارة بالمسؤولية",
"الضعف في الأداء",
"الاعتماد على الحظ"
], correct:0},

{q:"ما معنى العفو؟", options:[
"ترك العقوبة مع القدرة",
"تنفيذ العقوبة فوراً",
"الهروب من الحكم"
], correct:0},

{q:"ما القيمة في (إني حفيظ عليم)؟", options:[
"الكفاءة في تحمل المسؤولية",
"الكسل في العمل",
"الضعف في الأداء"
], correct:0},

{q:"ما القيمة في (معاذ الله)؟", options:[
"العفة والابتعاد عن الحرام",
"الاستسلام للخطأ",
"اللامبالاة"
], correct:0},

{q:"ما نوع صبر يوسف؟", options:[
"صبر عن المعصية",
"صبر على الطاعة فقط",
"عدم وجود صبر"
], correct:0},

{q:"ما نوع صبر يعقوب؟", options:[
"صبر على الابتلاء",
"صبر عن المعصية",
"لا يوجد صبر"
], correct:0},

{q:"ما أركان الزواج؟", options:[
"الزوجان والصداق",
"النية فقط",
"المال فقط"
], correct:0},

{q:"عدة الحامل؟", options:[
"حتى تضع حملها",
"ثلاثة أشهر فقط",
"شهر واحد"
], correct:0},

{q:"عدة المرأة التي تحيض؟", options:[

], correct:0},

{q:"ما حكم الطلاق في الحيض؟", options:[

], correct:0},

{q:"العلاقة بين العلم والإيمان؟", options:[

"لا علاقة بينهما"
], correct:0},

{q:"أثر الإيمان بالغيب؟", options:[
"تحسين السلوك والتفكير",
"عدم التأثير إطلاقاً",
"إضعاف الشخصية"
], correct:0},

{q:"ما صفة عثمان بن عفان؟", options:[
"الحياء والبذل",
"البخل والتردد",
"العدوانية"
], correct:0},

{q:"نتيجة صلح الحديبية؟", options:[
"حقن الدماء وتحقيق السلم",
"اندلاع الحرب",
"ضعف المسلمين"
], correct:0},

{q:"تزويج الفتاة دون رضاها؟", options:[
"غير مقبول شرعاً",
"مقبول دائماً",
"لا يهم"
], correct:0},

{q:"المسارعة للطلاق؟", options:[
"غير صحيحة ويجب التريث",
"صحيحة دائماً",
"مستحبة"
], correct:0},

// -------- إضافات جديدة --------

{q:"ما الغاية من الزواج؟", options:[
"العفاف والاستقرار الأسري",
"الترفيه فقط",
"تحقيق المصالح المادية"
], correct:0},

{q:"ما نوع الطلاق الذي يمكن الرجوع فيه؟", options:[
"الطلاق الرجعي",
"الطلاق البائن",
"الطلاق النهائي"
], correct:0},

{q:"ما معنى المسؤولية؟", options:[
"تحمل نتائج الأفعال والواجبات",
"تجنب الواجبات",
"إلقاء اللوم على الآخرين"
], correct:0},

{q:"ما أثر الصبر؟", options:[
"تقوية الإيمان والثبات",
"إضعاف الشخصية",
"لا تأثير له"
], correct:0},

{q:"ما قيمة الشورى؟", options:[
"تحقيق القرار الجماعي السليم",
"إضاعة الوقت",
"فرض الرأي الفردي"
], correct:0},

{q:"ما المقصود بالتسامح؟", options:[
"قبول الآخرين والعفو عنهم",
"رفض الآخرين",
"الانتقام"
], correct:0},

{q:"ما أثر العفة؟", options:[
"حماية المجتمع من الفساد",
"نشر الفوضى",
"إضعاف القيم"
], correct:0},

{q:"ما دور العلم الصحيح؟", options:[
"تعزيز الإيمان",
"إضعاف العقيدة",
"لا علاقة له"
], correct:0},

{q:"ما حكم الالتزام بالتدابير الصحية؟", options:[
"واجب لحفظ النفس",
"غير مهم",
"اختياري بلا أهمية"
], correct:0}

];
// ---------------- خلط الإجابات ----------------
function shuffleOptions(q){
  let arr = q.options.map((opt,i)=>({text:opt, correct:i===q.correct}));

  for(let i = arr.length-1; i>0; i--){
    let j = Math.floor(Math.random()*(i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }

  q.options = arr.map(o=>o.text);
  q.correct = arr.findIndex(o=>o.correct);
}

// ---------------- منطق اللعبة ----------------
let index = 0;
let score = 0;

function loadQuestion(){
  let q = quiz[index];

  shuffleOptions(q);

  document.getElementById("question").innerText = q.q;

  let html="";
  q.options.forEach((opt,i)=>{
    html += `<div class="option" onclick="check(${i})">${opt}</div>`;
  });

  document.getElementById("options").innerHTML = html;
  document.getElementById("result").innerText = "";
}

function check(i){
  let q = quiz[index];

  if(i === q.correct){
    score++;
    playClap();
    document.getElementById("result").innerText="✔ صحيح";
  } else {
    playWrong();
    document.getElementById("result").innerText=
    "✖ خطأ | الجواب: " + q.options[q.correct];
  }

  document.getElementById("score").innerText="النقاط: "+score;

  setTimeout(()=>{
    index++;
    if(index >= quiz.length){
      document.getElementById("question").innerText="🎉 انتهيت!";
      document.getElementById("options").innerHTML="";
      return;
    }
    loadQuestion();
  },1200);
}

// ---------------- الأصوات ----------------
function playClap(){
  new Audio("https://www.soundjay.com/human/applause-8.mp3").play();
}

function playWrong(){
  new Audio("https://www.soundjay.com/button/beep-10.mp3").play();
}

loadQuestion();

</script>

</body>
</html>
